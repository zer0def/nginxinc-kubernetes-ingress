apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cors-policy-ingress
  annotations:
    nginx.org/policies: "cors-policy-simple"
spec:
  ingressClassName: "nginx"
  rules:
    - host: cors-policy.example.com
      http:
        paths:
          - path: /backend1
            pathType: Prefix
            backend:
              service:
                name: backend1-svc
                port:
                  number: 80
