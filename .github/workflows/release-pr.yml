name: Release PR

run-name: ${{ inputs.dry_run && '[DRY RUN] ' || '' }}Release NIC Docs ${{ inputs.nic_version }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      nic_version:
        description: "NIC version to release"
        required: true
        default: "5.5.0"
      current_versions:
        description: "Current versions to replace (NIC, Helm Chart, Operator)"
        required: true
        default: "5.4.0, 2.5.0, 3.5.0"
      new_versions:
        description: "Versions to release (Helm Chart, Operator)"
        required: true
        default: "2.6.0, 3.6.0"
      k8s_versions:
        description: "Kubernetes versions this release was tested on"
        required: true
        default: "1.28 - 1.35"
      new_nginx_version:
        description: "Nginx version to release"
        required: true
        default: "1.31.1 / R37.0.1.1"
      nap_version:
        description: "NAP versions (comma-separated: waf_version, waf_release_version) - leave empty to skip NAP update"
        required: false
        default: "37.0+5.635.1, 5.13.1"
      release_date:
        description: "Date for this release (D MMM YYYY)"
        required: true
        default: "22 May 2026"
      dry_run:
        description: "Don't create any PR's"
        type: boolean
        default: false
      debug:
        description: "Enable debug logging"
        type: boolean
        default: false


defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  nic-release-pr:
    name: Update NIC versions in local files and create PR
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ubuntu-24.04
    steps:
      - name: Parse versions
        id: parse
        run: |
          IFS=',' read -r current_version current_helm_version current_operator_version <<< "${{ inputs.current_versions }}"
          IFS=',' read -r new_helm_version new_operator_version <<< "${{ inputs.new_versions }}"
          # Trim whitespace from parsed values
          current_version=$(echo "${current_version}" | xargs)
          current_helm_version=$(echo "${current_helm_version}" | xargs)
          current_operator_version=$(echo "${current_operator_version}" | xargs)
          new_version=$(echo "${{ inputs.nic_version }}" | xargs)
          new_helm_version=$(echo "${new_helm_version}" | xargs)
          new_operator_version=$(echo "${new_operator_version}" | xargs)
          echo "current_version=${current_version}" >> $GITHUB_OUTPUT
          echo "current_helm_version=${current_helm_version}" >> $GITHUB_OUTPUT
          echo "current_operator_version=${current_operator_version}" >> $GITHUB_OUTPUT
          echo "new_version=${new_version}" >> $GITHUB_OUTPUT
          echo "new_helm_version=${new_helm_version}" >> $GITHUB_OUTPUT
          echo "new_operator_version=${new_operator_version}" >> $GITHUB_OUTPUT

          # Parse NAP versions if provided (waf_version,waf_release_version)
          # waf_release_version is shared by compiler, config manager, and enforcer containers
          if [ -n "${{ inputs.nap_version }}" ]; then
            IFS=',' read -r nap_waf_version nap_waf_release_version <<< "${{ inputs.nap_version }}"
            nap_waf_version=$(echo "${nap_waf_version}" | xargs)
            nap_waf_release_version=$(echo "${nap_waf_release_version}" | xargs)
            echo "nap_waf_version=${nap_waf_version}" >> $GITHUB_OUTPUT
            echo "nap_waf_release_version=${nap_waf_release_version}" >> $GITHUB_OUTPUT
          fi

      - name: Branch
        id: branch
        run: |
          version=${{ steps.parse.outputs.new_version }}
          version=${version%.*}
          echo "branch=release-$version" >> $GITHUB_OUTPUT

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.branch.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_COMMON_VAULT_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_COMMON_VAULT_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_COMMON_VAULT_SUBSCRIPTION_ID }}

      - name: Setup secrets
        id: secrets
        run: |
          echo "Setting secrets for job"
          NGINX_PAT=$(az keyvault secret show --name nginx-bot-pat --vault-name ${{ secrets.COMMON_KEYVAULT_NAME }} --query value -o tsv)
          echo "::add-mask::$NGINX_PAT"
          echo "NGINX_PAT=$NGINX_PAT" >> $GITHUB_OUTPUT

      - name: Generate secrets for snapshot tests
        run: |
          make secrets

      - name: Replace
        run: |
          .github/scripts/release-version-update.sh \
            ${{ steps.parse.outputs.current_version }} \
            ${{ steps.parse.outputs.current_helm_version }} \
            ${{ steps.parse.outputs.current_operator_version }} \
            ${{ steps.parse.outputs.new_version }} \
            ${{ steps.parse.outputs.new_helm_version }} \
            ${{ steps.parse.outputs.new_operator_version }}
        env:
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
          DEBUG: ${{ inputs.debug && 'true' || 'false' }}

      - name: Update tech specs JSON
        run: |
          python3 .github/scripts/tech-specs-update.py \
            --json-file .github/scripts/tech-specs.json \
            --json-only \
            --update-json \
            --current-nic-version "${{ steps.parse.outputs.current_version }}" \
            --current-helm-version "${{ steps.parse.outputs.current_helm_version }}" \
            --current-operator-version "${{ steps.parse.outputs.current_operator_version }}" \
            ${{ steps.parse.outputs.nap_waf_release_version && format('--nap-waf-release-version "{0}"', steps.parse.outputs.nap_waf_release_version) || '' }} \
            "${{ steps.parse.outputs.new_version }}" \
            "${{ inputs.k8s_versions }}" \
            "${{ inputs.new_nginx_version }}" \
            "" \
            ${{ steps.parse.outputs.nap_waf_version && format('"{0}"', steps.parse.outputs.nap_waf_version) || '' }}
        env:
          DEBUG: ${{ inputs.debug && 'true' || 'false' }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.secrets.outputs.NGINX_PAT }}
          commit-message: Release ${{ steps.parse.outputs.new_version }}
          title: Release ${{ steps.parse.outputs.new_version }}
          branch: docs/release-${{ steps.parse.outputs.new_version }}
          author: nginx-bot <integrations@nginx.com>
          body: |
            This automated PR updates the docs for ${{ steps.parse.outputs.new_version }} release.
        if: ${{ ! inputs.dry_run }}

  docs-release-pr:
    name: Update NIC versions in NGINX documentation and create PR
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ubuntu-24.04
    steps:
      - name: Parse versions
        id: parse
        run: |
          IFS=',' read -r new_helm_version new_operator_version <<< "${{ inputs.new_versions }}"
          new_version=$(echo "${{ inputs.nic_version }}" | xargs)
          new_helm_version=$(echo "${new_helm_version}" | xargs)
          new_operator_version=$(echo "${new_operator_version}" | xargs)
          echo "new_version=${new_version}" >> $GITHUB_OUTPUT
          echo "new_helm_version=${new_helm_version}" >> $GITHUB_OUTPUT
          echo "new_operator_version=${new_operator_version}" >> $GITHUB_OUTPUT

          # Parse NAP versions if provided (waf_version,waf_release_version)
          # waf_release_version is shared by compiler, config manager, and enforcer containers
          if [ -n "${{ inputs.nap_version }}" ]; then
            IFS=',' read -r nap_waf_version nap_waf_release_version <<< "${{ inputs.nap_version }}"
            nap_waf_version=$(echo "${nap_waf_version}" | xargs)
            nap_waf_release_version=$(echo "${nap_waf_release_version}" | xargs)
            echo "nap_waf_version=${nap_waf_version}" >> $GITHUB_OUTPUT
            echo "nap_waf_release_version=${nap_waf_release_version}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_COMMON_VAULT_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_COMMON_VAULT_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_COMMON_VAULT_SUBSCRIPTION_ID }}

      - name: Setup secrets
        id: secrets
        run: |
          echo "Setting secrets for job"
          NGINX_PAT=$(az keyvault secret show --name nginx-bot-pat --vault-name ${{ secrets.COMMON_KEYVAULT_NAME }} --query value -o tsv)
          echo "::add-mask::$NGINX_PAT"
          echo "NGINX_PAT=$NGINX_PAT" >> $GITHUB_OUTPUT

      - name: Update Documentation Versions
        run: |
          pip install --require-hashes -r .github/scripts/requirements.txt --no-deps
          .github/scripts/release-docs.sh \
            "${{ steps.parse.outputs.new_version }}" \
            "${{ steps.parse.outputs.new_helm_version }}" \
            "${{ steps.parse.outputs.new_operator_version }}" \
            "${{ inputs.k8s_versions }}" \
            "${{ inputs.new_nginx_version }}" \
            "${{ inputs.release_date }}" \
            "${{ steps.parse.outputs.nap_waf_version }}" \
            "${{ steps.parse.outputs.nap_waf_release_version }}"
        env:
          GITHUB_USERNAME: nginx-bot
          GITHUB_EMAIL: integrations@nginx.com
          GITHUB_TOKEN: ${{ steps.secrets.outputs.NGINX_PAT }}
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
          DEBUG: ${{ inputs.debug && 'true' || 'false' }}
